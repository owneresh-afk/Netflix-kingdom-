services:
  - type: web
    name: netflix-kingdom-bot
    env: python
    region: oregon
    plan: free
    rootDir: artifacts/bot
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PORT
        value: 6000
